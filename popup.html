<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Noah</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Noah</h1>
    <p class="hint">Click an extension to open its panel in a popup window. Focus the tab you want it to see first. Use ✎ to set or edit the panel path.</p>
    <div id="list">Loading…</div>
    <template id="row-tpl">
      <div class="row">
        <div class="row-main">
          <img class="icon" />
          <div class="meta">
            <div class="name"></div>
            <div class="id"></div>
          </div>
          <button class="btn-edit" title="Edit path">✎</button>
        </div>
        <div class="row-disclaimer" hidden></div>
        <div class="row-controls">
          <input type="text" class="path-input" placeholder="panel.html" spellcheck="false" />
          <button class="btn-save">Save</button>
          <button class="btn-open">Open</button>
        </div>
        <div class="row-status"></div>
      </div>
    </template>
    <script src="defaults.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
